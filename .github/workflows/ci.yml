name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install -U pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Test
        run: |
          . .venv/bin/activate
          pytest -q